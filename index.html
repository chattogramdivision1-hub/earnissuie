<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Master Pro - Smart System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Quicksand:wght@400;600&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --bg-dark: #080a10;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 360px;
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* IP Tracking Box (Whoer Style) */
        .ip-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            font-size: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            text-align: left;
        }

        .ip-card div { margin-bottom: 5px; display: flex; justify-content: space-between; }
        .ip-card span { color: var(--neon-blue); font-weight: bold; }
        .vpn-status { color: #ff4d4d !important; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Balance Display */
        .balance-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--neon-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Buttons */
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        button {
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .start-btn { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .stop-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #status-text { margin-top: 15px; font-size: 12px; font-weight: bold; color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="ip-card">
        <div>Your IP: <span id="ip">Loading...</span></div>
        <div>Location: <span id="loc">---</span></div>
        <div>ISP: <span id="isp">---</span></div>
        <div>VPN/Proxy: <span id="vpn" class="vpn-status">Checking...</span></div>
    </div>

    <h1>EARN MASTER PRO</h1>

    <div class="balance-circle">
        <div class="spinner" id="loader"></div>
        <div style="z-index: 5;">
            <div id="pts" style="font-size: 28px; font-family: 'Orbitron';">0.00</div>
            <div style="font-size: 10px; color: #888; letter-spacing: 1px;">BALANCE</div>
        </div>
    </div>

    <div class="btn-stack">
        <button id="startBtn" class="start-btn" onclick="startCycle()">Start Auto Cycle</button>
        <button id="stopBtn" class="stop-btn" onclick="stopCycle()" disabled>Stop System</button>
    </div>

    <div id="status-text">SYSTEM READY</div>
</div>

<script src='//libtl.com/sdk.js' data-zone='10974495' data-sdk='show_10974495'></script>

<script>
    let points = parseFloat(localStorage.getItem('user_points')) || 0;
    let isRunning = false;
    let cycleTimeout;

    // ১. উন্নত IP এবং VPN চেক
    async function getWhoerData() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('loc').innerText = data.city + ", " + data.country_code;
            document.getElementById('isp').innerText = data.org;
            
            // VPN Detection (সহজ পদ্ধতি: দেশ যদি বাংলাদেশ না হয়)
            if(data.country_code !== "BD") {
                document.getElementById('vpn').innerText = "Detected";
                alert("VPN detected! Please use real IP.");
            } else {
                document.getElementById('vpn').innerText = "None";
                document.getElementById('vpn').style.color = "#00ff00";
            }
        } catch (e) {
            document.getElementById('ip').innerText = "Failed to load";
        }
    }
    getWhoerData();

    function updatePoints() {
        document.getElementById('pts').innerText = points.toFixed(2);
        localStorage.setItem('user_points', points);
    }
    updatePoints();

    // ২. স্মার্ট অটো অ্যাড লুপ (X বাটন ডিটেকশন সহ)
    async function startCycle() {
        if (typeof show_10974495 !== 'function') return alert("SDK loading...");
        isRunning = true;
        toggleButtons(true);
        runMainLoop();
    }

    async function runMainLoop() {
        if (!isRunning) return;

        updateStatus("AD LOADING...", true);

        try {
            // অ্যাড শো হবে এবং ইউজার 'X' বাটন কাটা পর্যন্ত এখানে ওয়েট করবে
            await show_10974495();

            // অ্যাড ক্লোজ করার সাথে সাথে নিচের কাজগুলো হবে
            points += 0.50;
            updatePoints();
            updateStatus("SUCCESS! WAITING...", true);

            // ৫ সেকেন্ড গ্যাপ দিয়ে আবার অটোমেটিক শুরু
            cycleTimeout = setTimeout(() => {
                runMainLoop();
            }, 5000);

        } catch (err) {
            updateStatus("ERROR! RETRYING...", true);
            setTimeout(runMainLoop, 10000);
        }
    }

    function stopCycle() {
        isRunning = false;
        clearTimeout(cycleTimeout);
        toggleButtons(false);
        updateStatus("SYSTEM STOPPED", false);
    }

    // ৩. ইউটিলিটি ফাংশন
    function updateStatus(msg, spin) {
        document.getElementById('status-text').innerText = msg;
        document.getElementById('loader').style.display = spin ? 'block' : 'none';
    }

    function toggleButtons(active) {
        document.getElementById('startBtn').disabled = active;
        document.getElementById('stopBtn').disabled = !active;
        document.getElementById('startBtn').innerText = active ? "RUNNING" : "Start Auto Cycle";
    }
</script>

</body>
</html>
