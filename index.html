<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Master Pro | Future of Earning</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syncopate:wght@700&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007a;
            --dark: #05070a;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 122, 0.1) 0%, transparent 35%);
        }

        /* Background Animation */
        .orb {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .app-container {
            width: 370px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* IP Header Info */
        .header-info {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-info span { color: var(--primary); font-weight: 600; }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Points Display */
        .balance-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .balance-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 4s linear infinite;
            z-index: -1;
            opacity: 0.2;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #pts-val { font-size: 42px; font-weight: 800; display: block; color: #fff; }
        .pts-label { font-size: 10px; letter-spacing: 4px; color: var(--primary); font-weight: 600; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item small { font-size: 9px; color: #888; display: block; margin-bottom: 4px; }
        .stat-item b { font-size: 16px; color: #eee; }

        /* Action Buttons */
        .btn-box { display: flex; flex-direction: column; gap: 12px; }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-start {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #05070a;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4); }

        .btn-stop {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .btn-stop:hover:not(:disabled) { background: #ff4d4d; color: white; }

        button:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        /* Status & Loading */
        .status-bar {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px; height: 8px; background: var(--primary);
            border-radius: 50%; display: none;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

<div class="orb"></div>

<div class="app-container">
    <div class="header-info">
        <div>IP: <span id="ip-addr">0.0.0.0</span></div>
        <div>STatus: <span id="vpn-stat">SECURE</span></div>
    </div>

    <h1>EARN MASTER PRO</h1>

    <div class="balance-card">
        <span class="pts-label">AVAILABLE BALANCE</span>
        <span id="pts-val">0.00</span>
        <div class="pts-label" style="margin-top: 5px;">POINTS</div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <small>ADS WATCHED</small>
            <b id="ad-total">0</b>
        </div>
        <div class="stat-item">
            <small>ISP PROVIDER</small>
            <b id="isp-name" style="font-size: 10px;">Checking...</b>
        </div>
    </div>

    <div class="btn-box">
        <button id="startBtn" class="btn-start" onclick="startAutoProcess()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            START AUTO CYCLE
        </button>
        <button id="stopBtn" class="btn-stop" onclick="stopAutoProcess()" disabled>
            STOP SYSTEM
        </button>
    </div>

    <div class="status-bar">
        <div class="pulse-dot" id="p-dot"></div>
        <span id="status-msg">SYSTEM READY</span>
    </div>
</div>

<script src='//libtl.com/sdk.js' data-zone='10974495' data-sdk='show_10974495'></script>

<script>
    let userPoints = parseFloat(localStorage.getItem('up')) || 0;
    let userAds = parseInt(localStorage.getItem('ua')) || 0;
    let isLive = false;
    let autoTimer;

    // IP & Security Check
    async function initSecurity() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('ip-addr').innerText = d.ip;
            document.getElementById('isp-name').innerText = d.org.substring(0, 15);
            if(d.country_code !== "BD") {
                document.getElementById('vpn-stat').innerText = "VPN DETECTED";
                document.getElementById('vpn-stat').style.color = "#ff4d4d";
            }
        } catch(e) { document.getElementById('ip-addr').innerText = "OFFLINE"; }
    }
    initSecurity();

    function updateUI() {
        document.getElementById('pts-val').innerText = userPoints.toFixed(2);
        document.getElementById('ad-total').innerText = userAds;
        localStorage.setItem('up', userPoints);
        localStorage.setItem('ua', userAds);
    }
    updateUI();

    async function startAutoProcess() {
        if (typeof show_10974495 !== 'function') return alert("SDK Error!");
        isLive = true;
        toggleButtons(true);
        runLoop();
    }

    async function runLoop() {
        if(!isLive) return;
        
        updateStatus("FETCHING AD...", true);

        try {
            // ১. অ্যাড ওপেন হবে এবং বন্ধ হওয়া পর্যন্ত ওয়েট করবে
            await show_10974495();
            
            // ২. ক্লোজ করার পরের লজিক
            userPoints += 0.50;
            userAds++;
            updateUI();
            updateStatus("SUCCESS! COOLING DOWN...", true);

            // ৫ সেকেন্ডের স্মুথ ট্রানজিশন
            autoTimer = setTimeout(() => {
                runLoop();
            }, 5000);

        } catch(err) {
            updateStatus("RETRIEVING...", true);
            setTimeout(runLoop, 8000);
        }
    }

    function stopAutoProcess() {
        isLive = false;
        clearTimeout(autoTimer);
        toggleButtons(false);
        updateStatus("SYSTEM READY", false);
    }

    function updateStatus(m, s) {
        document.getElementById('status-msg').innerText = m;
        document.getElementById('p-dot').style.display = s ? 'block' : 'none';
    }

    function toggleButtons(active) {
        document.getElementById('startBtn').disabled = active;
        document.getElementById('stopBtn').disabled = !active;
        document.getElementById('startBtn').innerHTML = active ? "AUTO RUNNING..." : "START AUTO CYCLE";
    }
</script>

</body>
</html>
