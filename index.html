<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Master - Smart Auto</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600&display=swap');

        :root {
            --neon-cyan: #00f7ff;
            --neon-purple: #9d00ff;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-purple);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 360px;
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 22px;
            background: linear-gradient(to right, var(--neon-cyan), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        /* Counter Circle */
        .status-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .status-circle.active {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: 0.5s;
        }

        #points { font-size: 32px; font-weight: 700; color: #fff; }
        .label { font-size: 10px; letter-spacing: 2px; color: var(--neon-cyan); text-transform: uppercase; }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 15px; }

        button {
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .btn-auto {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            color: #000;
        }

        .btn-auto:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }

        .btn-stop {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
        }

        .btn-stop:hover { background: #ff4d4d; color: white; }

        .system-status {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .dot {
            height: 8px; width: 8px; background: #888;
            border-radius: 50%; display: inline-block; margin-right: 5px;
        }
        .dot.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <h1>EARN MASTER</h1>

    <div class="status-circle" id="circle">
        <span class="label">Points</span>
        <span id="points">0.00</span>
        <span class="label" id="ad-count" style="color:#888; margin-top:5px">Ads: 0</span>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-auto" onclick="initiateAutoSystem()">START AUTO CYCLE</button>
        <button id="stopBtn" class="btn-stop" onclick="killSystem()" disabled>STOP SYSTEM</button>
    </div>

    <div class="system-status">
        <span id="statusDot" class="dot"></span> 
        <span id="statusText">System: Offline</span>
    </div>
</div>

<script src='//libtl.com/sdk.js' data-zone='10974495' data-sdk='show_10974495'></script>

<script>
    let totalPoints = parseFloat(localStorage.getItem('pts')) || 0;
    let totalAds = parseInt(localStorage.getItem('ads')) || 0;
    let isSystemRunning = false;

    // UI Initializer
    function refreshUI() {
        document.getElementById('points').innerText = totalPoints.toFixed(2);
        document.getElementById('ad-count').innerText = "Ads: " + totalAds;
        localStorage.setItem('pts', totalPoints);
        localStorage.setItem('ads', totalAds);
    }
    refreshUI();

    async function initiateAutoSystem() {
        if (typeof show_10974495 !== 'function') {
            alert("Ad SDK not loaded. Refresh page.");
            return;
        }

        isSystemRunning = true;
        updateStatus(true, "System: Running...");
        
        cycleAd();
    }

    async function cycleAd() {
        if (!isSystemRunning) return;

        updateStatus(true, "Loading Ad...");
        
        try {
            // Monetag Ad Show
            await show_10974495();
            
            // Ad Success Logic
            totalAds++;
            totalPoints += 0.50;
            refreshUI();
            
            updateStatus(true, "Ad Finished. Re-syncing...");

            // ৫ সেকেন্ড গ্যাপ দিয়ে আবার অটো শুরু (Loop)
            setTimeout(() => {
                if(isSystemRunning) cycleAd();
            }, 5000);

        } catch (error) {
            console.log("Ad Interrupted or Error");
            updateStatus(true, "Retrying in 10s...");
            setTimeout(() => {
                if(isSystemRunning) cycleAd();
            }, 10000);
        }
    }

    function killSystem() {
        isSystemRunning = false;
        updateStatus(false, "System: Offline");
        alert("Auto System Terminated.");
    }

    function updateStatus(active, text) {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        const circle = document.getElementById('circle');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        txt.innerText = text;
        if(active) {
            dot.classList.add('online');
            circle.classList.add('active');
            startBtn.disabled = true;
            stopBtn.disabled = false;
        } else {
            dot.classList.remove('online');
            circle.classList.remove('active');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
    }
</script>

</body>
</html>
