<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Master - Infinite Auto</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Quicksand:wght@400;600&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --bg-dark: #080a10;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            padding: 40px 20px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* Animated Spinner */
        .loader-box {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            display: none; /* Default Hidden */
        }

        .spinner.active { display: block; }

        @keyframes spin {
            0% { transform: rotate(0deg); border-top-color: var(--neon-blue); }
            50% { border-top-color: var(--neon-pink); }
            100% { transform: rotate(360deg); border-top-color: var(--neon-blue); }
        }

        #balance {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Buttons */
        .btn-stack { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }

        button {
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            text-transform: uppercase;
        }

        .start-btn {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        .stop-btn {
            background: #1a1a1a;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }

        .status-text {
            margin-top: 20px;
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
        }

        #status-msg { color: var(--neon-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>EARN MASTER PRO</h1>

    <div class="loader-box">
        <div class="spinner" id="main-spinner"></div>
        <div style="z-index: 10;">
            <div id="balance">0.00</div>
            <div style="font-size: 10px; color: #888; margin-top: 5px;">POINTS EARNED</div>
        </div>
    </div>

    <div class="btn-stack">
        <button id="runBtn" class="start-btn" onclick="startInfiniteCycle()">Start Auto ads</button>
        <button id="quitBtn" class="stop-btn" onclick="stopInfiniteCycle()" disabled>Stop System</button>
    </div>

    <p class="status-text">STATUS: <span id="status-msg">READY</span></p>
</div>

<script src='//libtl.com/sdk.js' data-zone='10974495' data-sdk='show_10974495'></script>

<script>
    let points = parseFloat(localStorage.getItem('user_pts')) || 0;
    let isAutoOn = false;
    let cycleTimer;

    function updateDisplay() {
        document.getElementById('balance').innerText = points.toFixed(2);
        localStorage.setItem('user_pts', points);
    }
    updateDisplay();

    async function startInfiniteCycle() {
        if (typeof show_10974495 !== 'function') return alert("SDK Loading...");
        
        isAutoOn = true;
        toggleUI(true);
        runAdLoop();
    }

    async function runAdLoop() {
        if (!isAutoOn) return;

        setStatus("LOADING AD...", true);
        
        try {
            // ১. অ্যাড দেখানো শুরু
            await show_10974495();
            
            // ২. অ্যাড সাকসেস হলে পয়েন্ট যোগ
            points += 0.50;
            updateDisplay();

            // ৩. "X" বাটনে ক্লিক করার ঝামেলা ছাড়াই অটোমেটিক লোডিং স্টেটে যাওয়া
            setStatus("WAITING NEXT...", true);
            
            // ৫ সেকেন্ড গ্যাপ দিয়ে আবার অটো লুপ
            cycleTimer = setTimeout(() => {
                runAdLoop();
            }, 6000); // ৬ সেকেন্ড বিরতি

        } catch (err) {
            console.log("Ad Blocked or Skipped");
            setStatus("RETRYING...", true);
            setTimeout(runAdLoop, 8000); // এরর হলে ৮ সেকেন্ড পর ট্রাই
        }
    }

    function stopInfiniteCycle() {
        isAutoOn = false;
        clearTimeout(cycleTimer);
        toggleUI(false);
        setStatus("SYSTEM STOPPED", false);
    }

    function setStatus(msg, spin) {
        document.getElementById('status-msg').innerText = msg;
        const spinner = document.getElementById('main-spinner');
        if (spin) spinner.classList.add('active');
        else spinner.classList.remove('active');
    }

    function toggleUI(running) {
        document.getElementById('runBtn').disabled = running;
        document.getElementById('quitBtn').disabled = !running;
        if(running) {
            document.getElementById('runBtn').innerText = "SYSTEM ACTIVE";
            document.getElementById('runBtn').style.opacity = "0.6";
        } else {
            document.getElementById('runBtn').innerText = "Start Auto ads";
            document.getElementById('runBtn').style.opacity = "1";
        }
    }
</script>

</body>
</html>
